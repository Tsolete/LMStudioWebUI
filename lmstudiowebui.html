<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LM Studio Chat</title>
	<link rel="stylesheet" type="text/css" href="estilos.css" />
</head>
<body>
    <div id="app">
        <div id="server-url-container">
            <input type="text" id="server-url" placeholder="Introduce la dirección del servidor de LM Studio">
            <button id="connect-button">Conectar</button>
        </div>
        <div id="connection-status">Desconectado</div>
        <div id="chat-container"></div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Escribe un mensaje..." disabled>
            <button id="send-button" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
	<script src="funciones.js"></script>
</body>
</html>
